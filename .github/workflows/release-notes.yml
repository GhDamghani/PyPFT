name: Release Notes Helper

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number"
        required: true
        type: string
      notes:
        description: "Markdown changelog notes"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

jobs:
  store-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Store notes
        shell: bash
        run: |
          mkdir -p .github/release-notes
          cat > ".github/release-notes/${{ inputs.pr_number }}.md" <<'EOF'
          ${{ inputs.notes }}
          EOF

      - name: Commit notes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/release-notes/
          git diff --cached --quiet && exit 0
          git commit -m "docs(release): store notes for PR #${{ inputs.pr_number }}"
          git push