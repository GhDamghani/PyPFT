name: Version And Changelog

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-metadata-main
  cancel-in-progress: false

jobs:
  update-release-metadata:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Skip if this merge commit already produced release metadata
        id: release_guard
        env:
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          if [[ -z "${MERGE_COMMIT_SHA}" ]]; then
            echo "The merged pull request did not expose merge_commit_sha." >&2
            exit 1
          fi

          if git log --format=%B HEAD | grep -Fxq "release-source: ${MERGE_COMMIT_SHA}"; then
            echo "already_released=true" >> "$GITHUB_OUTPUT"
            echo "Release metadata for ${MERGE_COMMIT_SHA} is already present on the base branch."
          else
            echo "already_released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.14
        if: ${{ steps.release_guard.outputs.already_released != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install project with development extras
        if: ${{ steps.release_guard.outputs.already_released != 'true' }}
        run: python -m pip install -e .[dev]

      - name: Determine release bump from branch prefix
        if: ${{ steps.release_guard.outputs.already_released != 'true' }}
        id: bump
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          branch_name="${HEAD_REF}"
          bump_kind="${branch_name%%/*}"

          case "$bump_kind" in
            major|minor|patch)
              echo "value=$bump_kind" >> "$GITHUB_OUTPUT"
              ;;
            copilot)
              echo "value=patch" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Merged branch '$branch_name' must start with major/, minor/, patch/, or copilot/." >&2
              exit 1
              ;;
          esac

      - name: Read merge commit description
        if: ${{ steps.release_guard.outputs.already_released != 'true' }}
        env:
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import subprocess

          merge_commit_sha = os.environ.get("MERGE_COMMIT_SHA", "").strip()
          if not merge_commit_sha:
              raise SystemExit(
                  "The merged pull request did not expose merge_commit_sha. "
                  "Use merge or squash merges for release-managed branches."
              )

          message = subprocess.check_output(
              ["git", "log", "-1", "--format=%B", merge_commit_sha],
              text=True,
          )
          parts = message.split("\n", 1)
          body = parts[1].strip() if len(parts) > 1 else ""
          Path("merge-body.md").write_text(f"{body}\n", encoding="utf-8")
          PY

      - name: Update version and changelog
        if: ${{ steps.release_guard.outputs.already_released != 'true' }}
        id: metadata
        run: |
          new_version=$(python scripts/update_release_metadata.py \
            --bump "${{ steps.bump.outputs.value }}" \
            --merge-body-file merge-body.md)
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Create release metadata pull request
        if: ${{ steps.release_guard.outputs.already_released != 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          add-paths: |
            pyproject.toml
            src/pypft/__init__.py
            CHANGELOG.md
          commit-message: |
            chore(release): v${{ steps.metadata.outputs.new_version }}

            release-source: ${{ github.event.pull_request.merge_commit_sha }}
          branch: release-metadata/${{ github.event.pull_request.merge_commit_sha }}
          base: ${{ github.event.pull_request.base.ref }}
          title: chore(release): v${{ steps.metadata.outputs.new_version }}
          body: |
            Automated release metadata update after merging `${{ github.event.pull_request.head.ref }}`.

            release-source: `${{ github.event.pull_request.merge_commit_sha }}`
