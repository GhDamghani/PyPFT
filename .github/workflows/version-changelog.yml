name: Version And Changelog

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-metadata-main
  cancel-in-progress: false

jobs:
  update-release-metadata:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Skip if this merge commit already produced release metadata
        id: release_guard
        env:
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          if [[ -z "${MERGE_COMMIT_SHA}" ]]; then
            echo "The merged pull request did not expose merge_commit_sha." >&2
            exit 1
          fi

          if git log --format=%B HEAD | grep -Fxq "release-source: ${MERGE_COMMIT_SHA}"; then
            echo "already_released=true" >> "$GITHUB_OUTPUT"
            echo "Release metadata for ${MERGE_COMMIT_SHA} is already present on the base branch."
          else
            echo "already_released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.14
        if: ${{ steps.release_guard.outputs.already_released != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install project with development extras
        if: ${{ steps.release_guard.outputs.already_released != 'true' }}
        run: python -m pip install -e .[dev]

      - name: Determine release bump from branch prefix
        if: ${{ steps.release_guard.outputs.already_released != 'true' }}
        id: bump
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          branch_name="${HEAD_REF}"
          bump_kind="${branch_name%%/*}"

          case "$bump_kind" in
            major|minor|patch)
              echo "value=$bump_kind" >> "$GITHUB_OUTPUT"
              ;;
            copilot)
              echo "value=patch" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Merged branch '$branch_name' must start with major/, minor/, patch/, or copilot/." >&2
              exit 1
              ;;
          esac

      - name: Read merge commit description
        if: ${{ steps.release_guard.outputs.already_released != 'true' }}
        env:
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import subprocess

          merge_commit_sha = os.environ.get("MERGE_COMMIT_SHA", "").strip()
          if not merge_commit_sha:
              raise SystemExit(
                  "The merged pull request did not expose merge_commit_sha. "
                  "Use merge or squash merges for release-managed branches."
              )

          message = subprocess.check_output(
              ["git", "log", "-1", "--format=%B", merge_commit_sha],
              text=True,
          )
          parts = message.split("\n", 1)
          body = parts[1].strip() if len(parts) > 1 else ""
          Path("merge-body.md").write_text(f"{body}\n", encoding="utf-8")
          PY

      - name: Update version and changelog
        if: ${{ steps.release_guard.outputs.already_released != 'true' }}
        id: metadata
        run: |
          new_version=$(python scripts/update_release_metadata.py \
            --bump "${{ steps.bump.outputs.value }}" \
            --merge-body-file merge-body.md)
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Create release metadata pull request
        if: ${{ steps.release_guard.outputs.already_released != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.metadata.outputs.new_version }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/pypft/__init__.py CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No release metadata changes detected."
            exit 0
          fi

          short_sha="${MERGE_COMMIT_SHA:0:12}"
          branch="release-metadata/${short_sha}"
          git checkout -B "$branch"
          git commit \
            -m "chore(release): v${NEW_VERSION}" \
            -m "release-source: ${MERGE_COMMIT_SHA}"
          git push --force-with-lease origin "$branch"

          pr_title="chore(release): v${NEW_VERSION}"
          pr_body=$(cat <<EOF
          Automated release metadata update after merging \`${HEAD_REF}\`.

          release-source: \`${MERGE_COMMIT_SHA}\`
          EOF
          )
          existing_pr_number=$(gh pr list --base "$BASE_REF" --head "$branch" --state open --json number --jq '.[0].number // empty')

          if [[ -n "$existing_pr_number" ]]; then
            gh pr edit "$existing_pr_number" --title "$pr_title" --body "$pr_body"
          else
            gh pr create --base "$BASE_REF" --head "$branch" --title "$pr_title" --body "$pr_body"
          fi
