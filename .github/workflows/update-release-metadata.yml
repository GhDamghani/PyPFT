name: Update release metadata

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: update-release-metadata-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  update-release-metadata:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Detect release class
        id: detect
        run: |
          python scripts/update_release_metadata.py detect \
            --branch "${{ github.event.pull_request.head.ref }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Apply version and changelog updates
        id: apply
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python scripts/update_release_metadata.py apply \
            --release-class "${{ steps.detect.outputs.release_class }}" \
            --pyproject pyproject.toml \
            --changelog CHANGELOG.md \
            --pr-title "$PR_TITLE" \
            --pr-number "$PR_NUMBER" \
            --github-output "$GITHUB_OUTPUT"

      - name: Commit generated metadata
        run: |
          if git diff --quiet -- pyproject.toml CHANGELOG.md; then
            echo "No release metadata changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGELOG.md
          git commit -m "chore(release): bump to v${{ steps.apply.outputs.new_version }} (${{ steps.apply.outputs.release_class }})"

      - name: Push to the protected branch 'protected'
        uses: CasperWA/push-protected@v2
        with:
          token: ${{ secrets.PUSH_TO_PROTECTED }}
          branch: ${{ github.event.pull_request.base.ref }}
          force: false
          unprotect_reviews: false
          tags: true

      - name: Write workflow summary
        run: |
          {
            echo "## Release metadata updated"
            echo ""
            echo "- Release class: ${{ steps.apply.outputs.release_class }}"
            echo "- Bump kind: ${{ steps.apply.outputs.bump_kind }}"
            echo "- Previous version: ${{ steps.apply.outputs.previous_version }}"
            echo "- New version: ${{ steps.apply.outputs.new_version }}"
            echo "- Source branch: ${{ github.event.pull_request.head.ref }}"
          } >> "$GITHUB_STEP_SUMMARY"