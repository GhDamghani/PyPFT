name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    concurrency: release

    permissions:
      contents: write
      id-token: write

    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Determine bump type
        id: bump
        shell: bash
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          if [[ "$BRANCH" == major/* ]]; then
            echo "force=major" >> "$GITHUB_OUTPUT"
          elif [[ "$BRANCH" == minor/* ]]; then
            echo "force=minor" >> "$GITHUB_OUTPUT"
          elif [[ "$BRANCH" == patch/* ]]; then
            echo "force=patch" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch prefix: $BRANCH"
            exit 1
          fi

      - name: Semantic release
        id: release
        uses: python-semantic-release/python-semantic-release@v9.20.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions"
          git_committer_email: "actions@users.noreply.github.com"
          force: ${{ steps.bump.outputs.force }}

      - name: Publish release artifacts to GitHub
        if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v9.20.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

      - name: Publish package to PyPI
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1