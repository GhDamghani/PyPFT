name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.PUSH_TO_PROTECTED }}
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Derive bump from source branch
        id: bump
        shell: bash
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          case "$BRANCH" in
            major/*) echo "level=major" >> "$GITHUB_OUTPUT" ;;
            minor/*) echo "level=minor" >> "$GITHUB_OUTPUT" ;;
            patch/*) echo "level=patch" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "Unsupported branch prefix: $BRANCH"
              exit 1
              ;;
          esac
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Collect release note source
        id: notes
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          pr_body = os.environ.get("PR_BODY") or ""
          pr_number = os.environ["PR_NUMBER"]
          notes_file = Path(f".github/release-notes/{pr_number}.md")
          out = Path("release-notes.md")

          text = ""
          if notes_file.exists():
              text = notes_file.read_text(encoding="utf-8").strip()
          else:
              m = re.search(
                  r"(?is)^##\s+Changelog Notes\s*(.*?)(?:^##\s+|\Z)",
                  pr_body,
              )
              if m:
                  text = m.group(1).strip()

          if not text:
              text = f"- Internal maintenance release from PR #{pr_number}."

          out.write_text(text + "\n", encoding="utf-8")
          PY

      - name: Update version and changelog
        id: release_meta
        shell: bash
        run: |
          python scripts/release.py \
            --level "${{ steps.bump.outputs.level }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --pr-title "${{ github.event.pull_request.title }}" \
            --branch "${{ steps.bump.outputs.branch }}" \
            --notes-file release-notes.md

          echo "version=$(python scripts/release.py --print-version)" >> "$GITHUB_OUTPUT"

      - name: Commit release changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGELOG.md
          git diff --cached --quiet && exit 0
          git commit -m "chore(release): v${{ steps.release_meta.outputs.version }}"
          git push origin main

      - name: Create tag
        shell: bash
        run: |
          git tag "v${{ steps.release_meta.outputs.version }}"
          git push origin "v${{ steps.release_meta.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release_meta.outputs.version }}
          generate_release_notes: true